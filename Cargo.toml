# STG-Ashland Core Backend

Authoritative backend for Minecraft 1.21.1 NeoForge project.

## Requirements
- Rust (latest stable)
- PostgreSQL
- `protoc` (Protocol Buffers compiler)

## System Dependencies
To build the project, you must have `protoc` installed.

**Ubuntu/Debian:**
```bash
sudo apt-get install protobuf-compiler
```

**Fedora:**
```bash
sudo dnf install protobuf-compiler
```

## Build
```bash
cargo check --workspace
cargo build --workspace
```

## Testing
```bash
cargo test --workspace
```
